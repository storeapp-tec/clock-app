<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClockStudio">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">

    <title>Studio Clock</title>

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Orbitron:wght@900&family=JetBrains+Mono:wght@800&family=Playfair+Display:ital,wght@1,900&family=Bebas+Neue&family=Syncopate:wght@700&family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=Kalam:wght@700&family=Comic+Neue:wght@700&family=Tektur:wght@900&family=Dancing+Script:wght@700&family=Shadows+Into+Light&family=Fredoka+One&family=Righteous&family=Alfa+Slab+One&family=Short+Stack&family=Playwrite+IE&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET Y BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #000; color: white; overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; }

        /* ===== PANTALLA DE INICIO ===== */
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.4s ease;
        }
        .phone-icon {
            width: 50px; height: 80px; border: 3px solid white; border-radius: 8px;
            margin-bottom: 20px; animation: rotate 2s infinite ease-in-out;
        }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        #btn-start {
            padding: 20px 70px; background: white; color: black; border: none;
            border-radius: 50px; font-weight: bold; font-size: 1.4rem; cursor: pointer;
        }

        /* ===== SLIDER ===== */
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; width: 100vw; height: 100vh; scroll-behavior: smooth; }
        .slider::-webkit-scrollbar { display: none; }
        .screen { min-width: 100vw; height: 100vh; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }

        /* ===== ELEMENTOS GLOBALES ===== */
        .date-info {
            position: absolute;
            font-size: 3.5vh;
            color: #fff;
            font-weight: 900;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            z-index: 10;
            letter-spacing: 2px;
            font-family: sans-serif;
        }
        .ampm-info { font-size: 3vh; color: #ff2d55; font-weight: 900; margin-left: 10px; }
        .sep { color: #ff2d55; }

        /* DISEÑO 1: BENTO SPLIT-FLAP */
        .style-bento .bento-wrapper { display: flex; align-items: center; justify-content: center; gap: 1vw; }
        .style-bento .flap-box { background: #1a1a1a; border-radius: 30px; padding: 2vh 2.5vw; min-width: 22vw; height: 38vh; display: flex; flex-direction: row; align-items: center; justify-content: center; position: relative; overflow: hidden; gap: 0.5vw; }
        .style-bento .flap-digit { font-size: 32vh; font-weight: 900; font-family: 'Shadows Into Light', cursive; color: #fff; width: 7.5vw; text-align: center; position: relative; z-index: 2; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .style-bento .flap-divider { position: absolute; left: 5%; right: 5%; height: 3px; background: #ff2d55; border-radius: 2px; top: 50%; transform: translateY(-50%); z-index: 5; box-shadow: 0 0 10px rgba(255,45,85,0.3); }
        .style-bento .sep-flap { font-size: 18vh; font-weight: 900; color: #ff2d55; margin: 0 0.2vw; }
        .style-bento .flap-box .scan-light { position: absolute; left: -100%; top: 0; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 45, 85, 0.2), transparent); z-index: 1; pointer-events: none; transition: none; }
        .style-bento .flap-box .scan-light.active { animation: scanMove 0.8s ease forwards; }
        @keyframes scanMove { 0% { left: -100%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 120%; opacity: 0; } }

        /* DISEÑO 2: CYBER */
        .style-cyber { font-family: 'Orbitron', sans-serif; font-size: 45vh; }
        .style-cyber .hour-val { color: #fff; }
        .style-cyber .min-val { color: #00f2ff; }

        /* DISEÑO 3: MULTI */
        .style-multi .digit { font-size: 55vh; font-weight: 900; display: inline-block; }
        .style-multi .d1 { color: #FF3B30; }
        .style-multi .d2 { color: #FF9500; }
        .style-multi .d3 { color: #4CD964; }
        .style-multi .d4 { color: #007AFF; }
        .style-multi .sep-multi { font-size: 25vh; font-weight: 900; margin: 0 1vw; color: #ff2d55; }

        /* DISEÑO 4: RED BARS */
        .style-redbar { font-family: 'JetBrains Mono', monospace; }
        .style-redbar .time-wrapper { font-size: 40vh; display: flex; gap: 20px; align-items: center; }
        .style-redbar .bar-group { display: flex; flex-direction: column; align-items: center; }
        .style-redbar .bar-group .digit { font-weight: 900; color: #fff; }
        .style-redbar .mini-bar { height: 12px; width: 80%; background: #ff2d55; border-radius: 10px; margin-top: 2vh; }
        .style-redbar .sep-red { font-size: 40vh; font-weight: 900; color: #ff2d55; margin-top: -3vh; }

        /* DISEÑO 5: NEO-BRUTAL */
        .style-neo { gap: 3vw; }
        .style-neo .neo-box { background: #fff; color: #000; width: 30vw; height: 65vh; display: flex; justify-content: center; align-items: center; font-size: 50vh; font-family: 'Bebas Neue', sans-serif; transform: rotate(-2deg); box-shadow: 15px 15px 0 #ff2d55; border-radius: 10px; }
        .style-neo .neo-box.min-box { transform: rotate(2deg); margin-left: 20px; box-shadow: -15px 15px 0 #00f2ff; }

        /* DISEÑO 6: DEPTH 3D */
        .style-depth { display: flex; flex-direction: row; width: 100vw; height: 100vh; position: relative; }
        .style-depth .half-screen { flex: 1; display: flex; justify-content: center; align-items: center; line-height: 0.8; perspective: 1200px; transform: rotateX(20deg); text-shadow: 0 1.5vh 0 var(--depth-shadow, #999999); height: 100vh; width: 50vw; transition: text-shadow 0.3s ease; }
        .style-depth .sep-depth { font-size: 45vh; font-weight: 900; margin: 0 0.5vw; color: #ff2d55; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .style-depth.font-alfa .half-screen { font-family: 'Alfa Slab One', serif; font-size: 40vh; }
        .style-depth.font-shortstack .half-screen { font-family: 'Short Stack', cursive; font-size: 50vh; }
        .style-depth.font-playwrite .half-screen { font-family: 'Playwrite IE', cursive; font-size: 35vh; }

        /* DISEÑO 7: ELEGANT */
        .style-elegant { font-family: 'Playfair Display', serif; font-style: italic; font-size: 55vh; width: 100%; text-align: center; line-height: 0.75; display: flex; justify-content: center; align-items: center; }

        /* DISEÑO 8: MATRIX */
        #matrix-canvas { position: absolute; inset: 0; width: 100vw; height: 100vh; opacity: 0.3; }
        .style-matrix { font-family: 'Share Tech Mono', monospace; font-size: 28vh; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 1.5vw; flex-wrap: wrap; }
        .style-matrix .hour-val, .style-matrix .min-val, .style-matrix .sec-val { -webkit-text-stroke: 2px #00ff41; color: transparent; text-shadow: none; }
        .style-matrix .sep-matrix { color: #00ff41; -webkit-text-stroke: 1px #00ff41; color: transparent; }

        /* DISEÑO 9: NEON */
        .style-neon { display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 800px; }
        .style-neon .neon-digit { font-family: 'Syncopate', sans-serif; font-size: 35vh; font-weight: 700; -webkit-text-stroke: 2px #ff2d55; color: transparent; transition: all 0.4s ease; }
        .style-neon .neon-digit.glow { color: #ff2d55; -webkit-text-stroke: 0px transparent; text-shadow: 0 0 10px #ff2d55, 0 0 20px #ff2d55, 0 0 40px #ff2d55; }
        .style-neon .neon-digit.sweep { background: linear-gradient(90deg, transparent 0%, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%, transparent 100%); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: lightSweep 2s infinite ease-in-out; }
        @keyframes lightSweep { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* DISEÑO 10: TITAN */
        .style-titan { font-family: 'Anton', sans-serif; font-size: 70vh; line-height: 0.6; letter-spacing: -3vw; display: flex; align-items: center; justify-content: center; gap: 0.5vw; position: relative; }
        .style-titan .titan-digit { position: relative; z-index: 2; display: inline-block; transition: color 0.3s ease; }
        .style-titan .titan-digit.d1 { transform: rotate(-8deg); }
        .style-titan .titan-digit.d2 { transform: rotate(-3deg); }
        .style-titan .titan-digit.d3 { transform: rotate(3deg); }
        .style-titan .titan-digit.d4 { transform: rotate(8deg); }
        .style-titan .titan-digit::before { content: attr(data-text); position: absolute; top: -12%; left: -5%; z-index: -1; opacity: 0.2; }

        /* UI CONFIG */
        #btn-ui { position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; cursor: pointer; backdrop-filter: blur(10px); display: none; }
        #config { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: rgba(12,12,12,0.97); backdrop-filter: blur(30px); z-index: 2000; display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.06); transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        #config.open { right: 0; }
        .config-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .config-body { padding: 20px 25px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .color-group { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px 15px; }
        .color-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
        .color-row input[type="color"] { -webkit-appearance: none; width: 32px; height: 32px; border: none; border-radius: 8px; cursor: pointer; background: none; }
    </style>
</head>
<body onclick="showUI()">

    <!-- OVERLAY INICIO -->
    <div id="start-overlay">
        <div class="phone-icon"></div>
        <h1 style="font-size: 3rem; font-family: 'Anton';">STUDIO CLOCK</h1>
        <p style="opacity: 0.5; margin-bottom: 40px;">Optimizado para 21:9 Landscape</p>
        <button id="btn-start" onclick="startApp()">COMENZAR</button>
    </div>

    <!-- BOTÓN UI -->
    <button id="btn-ui" onclick="document.getElementById('config').classList.add('open')">⚙️</button>

    <!-- MENU CONFIG -->
    <div id="config">
        <div class="config-header">
            <h2>⚙️ AJUSTES</h2>
            <button style="background:none; border:none; color:#888; font-size:36px; cursor:pointer;" onclick="document.getElementById('config').classList.remove('open')">&times;</button>
        </div>
        <div class="config-body" id="config-body">
            <div id="color-panels"></div>
            <div style="display:flex; gap:15px; padding:15px; background:rgba(255,255,255,0.03); border-radius:12px;">
                <label>12h <input type="checkbox" id="in-12"></label>
                <label>Fecha <input type="checkbox" id="in-date" checked></label>
            </div>
            <button style="width:100%; padding:14px; background:#fff; border:none; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="document.getElementById('config').classList.remove('open')">LISTO</button>
        </div>
    </div>

    <!-- SLIDER -->
    <main class="slider" id="slider">
        <!-- 1. BENTO SPLIT-FLAP -->
        <section class="screen style-bento" data-design="1">
            <div class="date-info" style="top: 3vh; right: 3vw;">--/--</div>
            <div class="bento-wrapper">
                <div class="flap-box"><span class="flap-digit" id="h1">0</span><span class="flap-digit" id="h2">0</span><div class="flap-divider"></div><div class="scan-light" id="scan-h"></div></div>
                <span class="sep-flap">:</span>
                <div class="flap-box"><span class="flap-digit" id="m1">0</span><span class="flap-digit" id="m2">0</span><div class="flap-divider"></div><div class="scan-light" id="scan-m"></div></div>
                <span class="sep-flap">:</span>
                <div class="flap-box"><span class="flap-digit" id="s1">0</span><span class="flap-digit" id="s2">0</span><div class="flap-divider"></div><div class="scan-light" id="scan-s"></div></div>
            </div>
        </section>

        <!-- [ESTÁN AQUÍ LAS DEMÁS PANTALLAS 2 A 10 CON SUS IDs ORIGINALES] -->
        <section class="screen style-cyber" data-design="2">
            <div class="date-info" style="bottom: 5vh; left: 5vw;">--/--</div>
            <span class="hour-val">00</span><span class="sep">:</span><span class="min-val">00</span>
        </section>
        <section class="screen style-multi" data-design="3">
            <div class="date-info" style="top: 5vh; left: 5vw;">--/--</div>
            <span class="digit d1">0</span><span class="digit d2">0</span><span class="sep-multi">:</span><span class="digit d3">0</span><span class="digit d4">0</span>
        </section>
        <section class="screen style-redbar" data-design="4">
            <div class="date-info" style="top: 5vh; right: 5vw;">--/--</div>
            <div class="time-wrapper"><div class="bar-group"><span class="digit hour-val">00</span><div class="mini-bar" id="bar-h"></div></div><span class="sep-red">:</span><div class="bar-group"><span class="digit min-val">00</span><div class="mini-bar" id="bar-m"></div></div></div>
        </section>
        <section class="screen style-neo" data-design="5">
            <div class="date-info" style="bottom: 5vh; right: 5vw; background: #ff2d55; color: #000;">--/--</div>
            <div class="neo-box" id="neo-h"><span class="digit hour-val">00</span></div><div class="neo-box min-box" id="neo-m"><span class="digit min-val">00</span></div>
        </section>
        <section class="screen style-depth font-alfa" data-design="6">
            <div class="half-screen" id="depth-left" style="background:#000;"><span class="hour-val" id="d6-h">00</span></div><span class="sep-depth" id="d6-sep">:</span><div class="half-screen" id="depth-right" style="background:#fff;"><span class="min-val" id="d6-m">00</span></div>
        </section>
        <section class="screen style-elegant" data-design="7"><span class="hour-val">00</span><span style="color:#ff2d55; margin:0 1vw;">:</span><span class="min-val">00</span></section>
        <section class="screen style-matrix" data-design="8"><canvas id="matrix-canvas"></canvas><span class="hour-val" id="mh1">0</span><span class="hour-val" id="mh2">0</span><span style="color:#00ff41;">:</span><span class="min-val" id="mm1">0</span><span class="min-val" id="mm2">0</span></section>
        <section class="screen style-neon" data-design="9"><div style="display:flex; align-items:center; gap:2vw;"><span class="neon-digit" id="nh1">0</span><span class="neon-digit" id="nh2">0</span><span style="color:#ff2d55; font-size:20vh;">:</span><span class="neon-digit" id="nm1">0</span><span class="neon-digit" id="nm2">0</span></div></section>
        <section class="screen style-titan" data-design="10"><span class="titan-digit d1" id="t1" data-text="0">0</span><span class="titan-digit d2" id="t2" data-text="0">0</span><span style="margin:0 1vw; opacity:0.5;">:</span><span class="titan-digit d3" id="t3" data-text="0">0</span><span class="titan-digit d4" id="t4" data-text="0">0</span></section>
    </main>

    <script>
        // --- REGISTRO PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        // --- TU LÓGICA ORIGINAL DE RELOJ ---
        const DESIGN_COLORS = { /* ...tus colores originales... */ };
        let currentDesign = 1;

        function startApp() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('start-overlay').style.display = 'none';
                document.getElementById('btn-ui').style.display = 'block';
            }, 400);
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
        }

        function showUI() {
            const btn = document.getElementById('btn-ui');
            btn.style.opacity = "1";
            clearTimeout(window.uit);
            window.uit = setTimeout(() => { if(!document.getElementById('config').classList.contains('open')) btn.style.opacity = "0"; }, 3000);
        }

        // MATRIX
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        function resizeMatrix() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeMatrix); resizeMatrix();
        const drops = Array(Math.floor(canvas.width / 20)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "20px monospace";
            drops.forEach((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // UPDATE CLOCK
        function update() {
            const now = new Date();
            const h12 = document.getElementById('in-12').checked;
            let h = now.getHours(); const m = now.getMinutes(); const s = now.getSeconds();
            if(h12) h = h % 12 || 12;
            const hh = String(h).padStart(2, '0'); const mm = String(m).padStart(2, '0'); const ss = String(s).padStart(2, '0');
            const dStr = now.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

            // IDs Originales
            if(document.getElementById('h1')) {
                document.getElementById('h1').textContent = hh[0]; document.getElementById('h2').textContent = hh[1];
                document.getElementById('m1').textContent = mm[0]; document.getElementById('m2').textContent = mm[1];
                document.getElementById('s1').textContent = ss[0]; document.getElementById('s2').textContent = ss[1];
            }
            
            document.querySelectorAll('.hour-val').forEach(el => el.textContent = hh);
            document.querySelectorAll('.min-val').forEach(el => el.textContent = mm);
            document.querySelectorAll('.date-info').forEach(el => el.textContent = dStr);

            // Scan effect Design 1
            if(s % 2 === 0 && document.getElementById('scan-h')) {
                document.getElementById('scan-h').classList.add('active');
                document.getElementById('scan-m').classList.add('active');
                document.getElementById('scan-s').classList.add('active');
                setTimeout(() => { document.querySelectorAll('.scan-light').forEach(el => el.classList.remove('active')); }, 800);
            }
        }
        setInterval(update, 1000); update();

        // [MÁS LÓGICA DE TU CÓDIGO ORIGINAL SIN CAMBIOS]
    </script>
</body>
</html>
